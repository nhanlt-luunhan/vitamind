version: "3.8"
services:
  app:
    # Portainer Git stack: build from repo.
    build:
      context: .
      dockerfile: Dockerfile
    # Portainer Web Editor: use a prebuilt image instead.
    # image: your-registry/vitamind:latest
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: "production"
      PORT: "3333"
      NEXTAUTH_URL: "https://vitamind.com.vn"
      NEXTAUTH_SECRET: "change_me"
      DATABASE_URL: "postgresql://vitamind:vitamind@db:5432/vitamind"
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      ALLOW_EMAILS: ""
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3333/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "vitamind"
      POSTGRES_PASSWORD: "vitamind"
      POSTGRES_DB: "vitamind"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitamind"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:9
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@vitamind.com.vn"
      PGADMIN_DEFAULT_PASSWORD: "change-me-pgadmin"
      PGADMIN_SERVER_JSON_FILE: "/pgadmin4/servers.json"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    ports:
      - "${PGADMIN_BIND_IP:-127.0.0.1}:${PGADMIN_PORT:-35050}:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    restart: unless-stopped

volumes:
  db_data:
  pgadmin_data:
