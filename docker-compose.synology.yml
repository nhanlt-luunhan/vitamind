services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3333:3333"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: "production"
      PORT: "3333"
      NODE_OPTIONS: "--max-old-space-size=512"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./content:/app/content
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3333/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    init: true
    mem_limit: 768m
    cpus: "1.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "vitamind"
      POSTGRES_PASSWORD: "vitamind"
      POSTGRES_DB: "vitamind"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitamind"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.0"
    shm_size: "256mb"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "max_connections=50"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  adminer:
    image: adminer
    profiles: ["tools"]
    ports:
      - "33808:8080"
    depends_on:
      - db
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.25"

volumes:
  db_data:
