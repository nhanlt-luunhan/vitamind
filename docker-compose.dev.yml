services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3333:3333"
    env_file:
      - .env.dev.docker
    environment:
      NODE_ENV: "development"
      PORT: "3333"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./:/app
      - /app/node_modules
      - ./public/uploads:/app/public/uploads
      - ./content:/app/content
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "vitamind"
      POSTGRES_PASSWORD: "vitamind"
      POSTGRES_DB: "vitamind"
    ports:
      - "33542:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitamind"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
